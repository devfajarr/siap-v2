# =============================================================================
# SIAP - Sistem Informasi Akademik POLSA
# Apache Virtual Host Configuration
# =============================================================================
#
# Deploy:
#   cp siapv2.conf /etc/apache2/sites-available/siapv2.conf
#   a2ensite siapv2
#   systemctl reload apache2
#
# Modul yang harus aktif:
#   a2enmod proxy proxy_http proxy_wstunnel headers ssl rewrite
#   systemctl reload apache2
#
# Port mapping Docker container:
#   localhost:8200  → siap-app:8000   (Laravel HTTP via FrankenPHP)
#   localhost:8201  → siap-reverb:9000 (Laravel Reverb WebSocket)
# =============================================================================

# -----------------------------------------------------------------------------
# HTTP → HTTPS Redirect
# -----------------------------------------------------------------------------
<VirtualHost *:80>
    ServerName siapv2.polsa.ac.id
    ServerAdmin webmaster@polsa.ac.id

    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

# -----------------------------------------------------------------------------
# HTTPS — Main Application
# -----------------------------------------------------------------------------
<VirtualHost *:443>
    ServerName siapv2.polsa.ac.id
    ServerAdmin webmaster@polsa.ac.id

    # ---------- SSL (Let's Encrypt / Certbot) ----------
    SSLEngine on
    SSLCertificateFile    /etc/ssl/polsa.ac.id/polsa.ac.id-cert.pem
    SSLCertificateKeyFile /etc/ssl/polsa.ac.id/polsa.ac.id-key.pem

    # ---------- Headers ----------
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port  "443"
    RequestHeader set X-Real-IP         %{REMOTE_ADDR}s

    # ---------- WebSocket — Laravel Reverb (port 8201) ----------
    # PENTING: ProxyPass /app/ dan /apps/ HARUS di atas ProxyPass /
    # karena Apache mencocokkan rule dari atas ke bawah.
    # Reverb menggunakan protokol Pusher — endpoint-nya selalu /app/ dan /apps/
    ProxyPass        /app/  ws://127.0.0.1:8201/app/
    ProxyPassReverse /app/  ws://127.0.0.1:8201/app/

    ProxyPass        /apps/ ws://127.0.0.1:8201/apps/
    ProxyPassReverse /apps/ ws://127.0.0.1:8201/apps/

    # ---------- Reverse Proxy → Docker FrankenPHP (port 8200) ----------
    ProxyPass        / http://127.0.0.1:8200/
    ProxyPassReverse / http://127.0.0.1:8200/

    # ---------- Logging ----------
    ErrorLog  ${APACHE_LOG_DIR}/siapv2-error.log
    CustomLog ${APACHE_LOG_DIR}/siapv2-access.log combined
</VirtualHost>
